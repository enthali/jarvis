jobs:
  - name: t1-cron-sentinel
    schedule: '* * * * *'
    steps:
      - type: powershell
        run: scripts/write-sentinel.ps1
  - name: t2-manual-show-output
    schedule: manual
    steps:
      - type: command
        run: workbench.action.output.toggleOutput
  - name: t3-python-venv-check
    schedule: manual
    steps:
      - type: python
        run: scripts/venv-check.py
  - name: t4-fail-exit1
    schedule: manual
    steps:
      - type: powershell
        run: scripts/fail-exit1.ps1
  - name: t7-agent-hello
    schedule: manual
    steps:
      - type: agent
        prompt: prompts/hello.md
        outputFile: agent-response.txt
  - name: t8-queue-message
    schedule: manual
    steps:
      - type: queue
        destination: Test Session
        text: Hello from heartbeat queue step
  - name: 'Jarvis: Rescan'
    schedule: '*/1 * * * *'
    steps:
      - type: command
        run: jarvis.rescan
  - name: 'Jarvis: Category Refresh'
    schedule: '*/1 * * * *'
    steps:
      - type: command
        run: jarvis.refreshCategories
  - name: 'Jarvis: Task Refresh'
    schedule: '*/1 * * * *'
    steps:
      - type: command
        run: jarvis.refreshTasks
