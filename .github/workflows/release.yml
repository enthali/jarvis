# Implementation: SPEC_REL_RELEASEACTION
# Requirements: REQ_REL_RELEASEACTION, REQ_REL_VSCEPKG

name: Release Extension

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - run: npm ci
      - run: npm run compile
      - run: npm run package
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: '*.vsix'
          generate_release_notes: true
